name: deploy (frontend)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to S3 + invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build (prod)
        run: npm run build:prod

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::730335229921:role/legacy_code_migration
          aws-region: us-east-1

      - name: Sync to S3 (to prefix)
        run: |
          aws s3 sync dist/ s3://legacy-migration-code-frontend/legacy-code-migration-frontend/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id E1949SZ14Z3RBX --paths "/*"